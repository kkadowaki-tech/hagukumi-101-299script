<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はぐくみ企業年金｜アポトークスクリプト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1D4ED8;
    --blue-light: #3B82F6;
    --blue-pale: #EFF6FF;
    --blue-mid: #DBEAFE;
    --green: #059669;
    --green-pale: #ECFDF5;
    --amber: #D97706;
    --amber-pale: #FFFBEB;
    --purple: #7C3AED;
    --purple-pale: #F5F3FF;
    --teal: #0891B2;
    --teal-pale: #ECFEFF;
    --red: #DC2626;
    --red-pale: #FEF2F2;
    --gray: #1F2937;
    --gray-mid: #6B7280;
    --gray-light: #F9FAFB;
    --white: #ffffff;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #F1F5F9;
    min-height: 100vh;
    color: var(--gray);
  }

  /* LAYOUT */
  .shell {
    display: flex;
    min-height: 100vh;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px;
    gap: 24px;
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    position: sticky;
    top: 24px;
    align-self: flex-start;
  }

  .sidebar-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 4px 16px;
    border-bottom: 2px solid var(--blue-mid);
    margin-bottom: 16px;
  }

  .step-nav {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: none;
    text-align: left;
    width: 100%;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .nav-item:hover { background: var(--blue-pale); }

  .nav-item.active {
    background: var(--blue);
    color: white;
    box-shadow: 0 2px 12px rgba(29,78,216,0.35);
  }

  .nav-item.done { opacity: 0.6; }
  .nav-item.done .nav-num { background: var(--green); color: white; }

  .nav-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--blue-mid);
    color: var(--blue);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .nav-item.active .nav-num { background: rgba(255,255,255,0.25); color: white; }

  .nav-label { font-size: 12px; font-weight: 500; line-height: 1.3; }

  /* PROGRESS BAR */
  .progress-wrap {
    margin-top: 24px;
    padding: 0 4px;
  }
  .progress-label {
    font-size: 11px;
    color: var(--gray-mid);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .progress-bar {
    height: 6px;
    background: var(--blue-mid);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* MAIN CARD */
  .main {
    flex: 1;
    min-width: 0;
  }

  .card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: cardIn 0.3s ease;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid #E5E7EB;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .step-badge {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 3px;
  }

  .card-title { font-size: 22px; font-weight: 900; color: var(--gray); line-height: 1.3; }
  .card-subtitle { font-size: 13px; color: var(--gray-mid); margin-top: 4px; }

  .card-body { padding: 28px 32px; }

  /* TIP BOX */
  .tip {
    display: flex;
    gap: 10px;
    background: var(--amber-pale);
    border-left: 4px solid var(--amber);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 13px;
    line-height: 1.6;
    color: #92400E;
  }
  .tip-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  /* SCRIPT BOX */
  .script-box {
    border-radius: 12px;
    border: 1.5px solid;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .script-box-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .script-box-body {
    padding: 16px 20px;
    font-size: 14px;
    line-height: 2;
  }

  .script-line { 
    padding: 2px 0;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .script-line::before {
    content: '';
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.4;
    margin-top: 11px;
    flex-shrink: 0;
  }
  .script-line.empty { height: 8px; }
  .script-line.empty::before { display: none; }

  /* BRANCH BOX */
  .branch-header {
    background: #EEF2FF;
    border: 1.5px solid #C7D2FE;
    border-radius: 10px 10px 0 0;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 700;
    color: #3730A3;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .branch-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1.5px solid #C7D2FE;
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .branch-cell {
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.7;
  }

  .branch-cell:first-child { border-right: 1px solid #C7D2FE; }

  .branch-cell-label {
    font-weight: 700;
    font-size: 12px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* CHECK LIST */
  .check-list { list-style: none; margin-bottom: 20px; }
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 14px;
    background: var(--gray-light);
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 13px;
    line-height: 1.6;
  }
  .check-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--green);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* HEARING TABLE */
  .hearing-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  .hearing-table td { padding: 10px 14px; border: 1px solid #E5E7EB; font-size: 13px; }
  .hearing-table td:first-child {
    background: var(--blue);
    color: white;
    font-weight: 700;
    font-size: 12px;
    width: 36px;
    text-align: center;
    border-color: var(--blue);
  }
  .hearing-table td:nth-child(2) { font-weight: 600; width: 200px; background: var(--blue-pale); }
  .hearing-table td:nth-child(3) { color: var(--gray-mid); font-size: 12px; }
  .hearing-table tr:first-child td { border-top: none; }
  .hearing-table tr:first-child td:first-child { border-radius: 8px 0 0 0; }
  .hearing-table tr:last-child td:first-child { border-radius: 0 0 0 8px; }
  .hearing-table tr:first-child td:last-child { border-radius: 0 8px 0 0; }
  .hearing-table tr:last-child td:last-child { border-radius: 0 0 8px 0; }

  /* SCHEDULE LINKS */
  .schedule-block {
    margin-bottom: 20px;
  }
  .schedule-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .schedule-card {
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .schedule-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .schedule-card-header {
    padding: 10px 14px 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .schedule-card-body {
    padding: 8px 14px 6px;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.4;
  }
  .schedule-card-note {
    padding: 0 14px 4px;
    font-size: 11px;
    opacity: 0.7;
  }
  .schedule-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 8px 14px 14px;
    padding: 10px 0;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    transition: opacity 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .schedule-btn:hover { opacity: 0.85; }

  /* SUB LABEL */
  .sub-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--gray);
    margin: 20px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sub-label::before {
    content: '';
    width: 4px;
    height: 18px;
    background: var(--blue-light);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* NAVIGATION BUTTONS */
  .card-footer {
    padding: 20px 32px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #F3F4F6;
    gap: 12px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-prev {
    background: #F3F4F6;
    color: var(--gray-mid);
  }
  .btn-prev:hover { background: #E5E7EB; color: var(--gray); }

  .btn-next {
    background: var(--blue);
    color: white;
    box-shadow: 0 4px 14px rgba(29,78,216,0.3);
  }
  .btn-next:hover {
    background: #1E40AF;
    box-shadow: 0 6px 20px rgba(29,78,216,0.4);
    transform: translateY(-1px);
  }

  .btn-finish {
    background: var(--green);
    color: white;
    box-shadow: 0 4px 14px rgba(5,150,105,0.3);
  }
  .btn-finish:hover { background: #047857; transform: translateY(-1px); }

  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

  .step-counter {
    font-size: 12px;
    color: var(--gray-mid);
    font-weight: 500;
  }

  /* COMPLETE SCREEN */
  .complete-screen {
    text-align: center;
    padding: 60px 32px;
  }
  .complete-icon {
    font-size: 64px;
    margin-bottom: 20px;
    animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .complete-title { font-size: 26px; font-weight: 900; margin-bottom: 12px; color: var(--green); }
  .complete-body  { font-size: 14px; color: var(--gray-mid); line-height: 1.8; }
  .btn-restart { margin-top: 32px; background: var(--blue); color: white; padding: 14px 32px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; box-shadow: 0 4px 14px rgba(29,78,216,0.3); transition: all 0.2s; }
  .btn-restart:hover { background: #1E40AF; transform: translateY(-1px); }

  /* Q&A ACCORDION */
  .qa-section { margin-top: 28px; }
  .qa-section-label {
    font-size: 13px;
    font-weight: 700;
    color: #DC2626;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 8px 12px;
    background: #FEF2F2;
    border-radius: 8px;
    border-left: 4px solid #DC2626;
  }
  .qa-item {
    border: 1.5px solid #FCA5A5;
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .qa-item:hover { box-shadow: 0 2px 12px rgba(220,38,38,0.1); }
  .qa-question {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 16px;
    background: #FFF5F5;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
    font-weight: 700;
    color: #991B1B;
  }
  .qa-question-left { display: flex; align-items: flex-start; gap: 8px; }
  .qa-q-badge {
    background: #DC2626;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .qa-chevron {
    font-size: 12px;
    color: #DC2626;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .qa-item.open .qa-chevron { transform: rotate(180deg); }
  .qa-answer {
    display: none;
    padding: 14px 16px 14px 40px;
    background: white;
    border-top: 1px solid #FCA5A5;
    font-size: 13px;
    line-height: 1.8;
    color: #374151;
  }
  .qa-item.open .qa-answer { display: block; }
  .qa-a-badge {
    display: inline-block;
    background: #059669;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 8px;
    vertical-align: middle;
  }

  @media (max-width: 720px) {
    .shell { flex-direction: column; padding: 12px; }
    .sidebar { width: 100%; position: static; }
    .step-nav { flex-direction: row; flex-wrap: wrap; }
    .nav-item { width: auto; }
    .card-header, .card-body, .card-footer { padding: 20px 18px; }
    .branch-grid { grid-template-columns: 1fr; }
    .branch-cell:first-child { border-right: none; border-bottom: 1px solid #C7D2FE; }
  }
</style>
</head>
<body>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">📋 Talk Script</div>
    <nav class="step-nav" id="stepNav"></nav>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>進捗</span>
        <span id="progressText">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="card" id="mainCard"></div>
  </main>
</div>

<script>
const steps = [
  {
    id: 1,
    label: "電話をつなぐ",
    title: "電話をつないでもらう",
    subtitle: "まず担当者・代表者に取り次いでもらうフェーズ",
    color: "#1D4ED8",

      { q: "「担当者に回してください」と言われた", a: "ありがとうございます。担当の方のお名前と、ご連絡先を伺えますでしょうか？後ほど改めてご連絡いたします。" },
      { q: "「どんな用件ですか？」と受付に聞かれた", a: "はい、厚労省認可の企業年金「はぐくみ企業年金」のご案内でして、社会保険料の軽減に関するご提案です。代表者様へお取り次ぎいただけますでしょうか。" },
      { q: "「いません／席を外しています」と言われた", a: "そうでしたか。では、いつ頃お戻りになりますでしょうか？改めてお電話させていただきます。" },
    ]
  },
  {
    id: 2,
    label: "内容を説明",
    title: "サービス内容を簡単に伝える",
    subtitle: "難しい用語は使わず、メリットを2点だけ伝えるフェーズ",
    color: "#0891B2",
    bgColor: "#CFFAFE",
    tip: "「社会保険料が減る」「福利厚生になる」の2点だけ！長くなるとここで切られます。",
    scripts: [

    ],
    qa: [
      { q: "「うちには必要ない」と言われた", a: "今すぐにというお話ではもちろんないのですが、加入者の社会保険料の軽減が見込めたり、結果的に法定福利費の軽減にもつながるという大きな特徴のある新しいサービスだったので、是非御社にもメリットがあると思いご連絡致しました。" },
      { q: "「今は忙しい」と言われた", a: "今すぐにというお話ではもちろんないのですが、加入者の社会保険料の軽減が見込めたり、結果的に法定福利費の軽減にもつながるという大きな特徴のある新しいサービスだったので、是非御社にもメリットがあると思いご連絡致しました。" },
      { q: "「他社でもう入っている」と言われた", a: "従業員から役員、代表まで全員が希望制で加入いただくことができ、制度設計上、加入者の社会保険料の軽減が見込めるので、結果的に法定福利費の軽減にもつながるという大きな特徴があるサービスになります。" },

  },
  {
    id: 3,
    label: "アポを取る",
    title: "オンライン面談のアポを取る",

    color: "#7C3AED",
    bgColor: "#EDE9FE",
    tip: "「買ってください」ではなく「情報共有だけ」のスタンスで。断られにくくなります！",
    scripts: [
      { label: "🗓️ アポ取りトーク", color: "#7C3AED", bg: "#F5F3FF", lines: [

      { q: "「役員報酬は変えていない／毎年同じ」と言われた", a: "ありがとうございます。改定月さえ合えば加入いただけますので、今の報酬額を変えずに手取りを増やす形で導入される方が多いです。ぜひ一度ご説明させてください。" },

const hearingRows = [
  { num: "1", label: "お名前", note: "" },
  { num: "2", label: "部署・役職", note: "" },
  { num: "3", label: "メールアドレス", note: "ZoomのURL送付先" },
  { num: "4", label: "MTGツール", note: "原則Zoom" },
  { num: "5", label: "携帯番号（任意）", note: "" },
  { num: "決", label: "決算月", note: "損金算入タイミングの確認" },
];

let currentStep = 0;

function buildNav() {
  const nav = document.getElementById('stepNav');
  nav.innerHTML = steps.map((s, i) => `
    <button class="nav-item ${i === currentStep ? 'active' : i < currentStep ? 'done' : ''}"
      onclick="goTo(${i})">
      <div class="nav-num">${i < currentStep ? '✓' : s.id}</div>
      <div class="nav-label">${s.label}</div>
    </button>
  `).join('');
}

function buildProgress() {
  const pct = Math.round((currentStep / (steps.length)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + '%';
}

function renderStep(step) {
  const s = steps[step];
  if (!s) { renderComplete(); return; }

  const badgeStyle = `background:${s.bgColor};color:${s.color}`;

  let bodyHTML = '';

  // TIP
  if (s.tip) {
    bodyHTML += `<div class="tip"><span class="tip-icon">💡</span><span>${s.tip}</span></div>`;
  }

  // SCRIPTS
  if (s.scripts) {
    s.scripts.forEach(sc => {
      const lines = sc.lines.map(l => l === ''
        ? `<div class="script-line empty"></div>`
        : `<div class="script-line" style="color:${sc.color}">${l}</div>`
      ).join('');
      bodyHTML += `
        <div class="script-box" style="border-color:${sc.color}20">
          <div class="script-box-header" style="background:${sc.bg};color:${sc.color}">
            <span>${sc.label}</span>
          </div>
          <div class="script-box-body">${lines}</div>
        </div>`;
    });
  }

  // HEARING TABLE
  if (s.hearing) {
    bodyHTML += `<div class="sub-label">① 基本情報 ＋ 決算月を確認する</div>`;
    const rows = hearingRows.map(r => `
      <tr>
        <td>${r.num}</td>
        <td>${r.label}</td>
        <td>${r.note}</td>
      </tr>`).join('');
    bodyHTML += `<table class="hearing-table"><tbody>${rows}</tbody></table>`;

    bodyHTML += `<div class="sub-label">② 退職金制度の確認</div>`;
    bodyHTML += `
      <div class="script-box" style="border-color:#D9770620">
        <div class="script-box-header" style="background:#FFFBEB;color:#D97706">
          <span>💬 確認トーク</span>
        </div>
        <div class="script-box-body">
          <div class="script-line" style="color:#374151">現在、退職金制度はご使用されていますでしょうか？</div>
          <div class="script-line" style="color:#374151">（加入済みの場合）どのような制度に加入していますか？</div>
          <div class="script-line" style="color:#6B7280">例：小規模企業共済 / 企業型DC / 中退共 / iDeCo+</div>
        </div>
      </div>`;

    bodyHTML += `<div class="sub-label">③ 導入要件チェック（必須）</div>`;
    bodyHTML += `<ul class="check-list">` + s.checkItems.map(c =>
      `<li class="check-item"><div class="check-icon">✓</div><span>${c}</span></li>`
    ).join('') + `</ul>`;

    // SCHEDULING LINKS
    bodyHTML += `<div class="sub-label">④ 日程調整リンクを送る</div>`;
    bodyHTML += `
      <div class="schedule-block">
        <div class="schedule-grid">
          <div class="schedule-card" style="border-color:#7C3AED;background:#F5F3FF;">
            <div class="schedule-card-header" style="background:#7C3AED;color:white;">
              🗓️ ミニ商談用Jicoo
            </div>
            <div class="schedule-card-note" style="color:#6D28D9;">jicoo / in-house-bpo-pre</div>
            <a class="schedule-btn" href="https://www.jicoo.com/t/betterplace/e/in-house-bpo-pre" target="_blank"
              style="background:#7C3AED;color:white;">
              🗓️ 日程調整リンクを開く
            </a>
          </div>
        </div>
      </div>`;
  }

  // BRANCH
  if (s.branch) {
    const opts = s.branch.options.map(o => `
      <div class="branch-cell" style="background:${o.bg}">
        <div class="branch-cell-label" style="color:${o.color}">
          ${o.label}<span style="font-weight:400;color:#6B7280">${o.sublabel}</span>
        </div>
        <div style="font-size:13px;line-height:1.7;color:#374151">${o.text}</div>
      </div>`).join('');
    bodyHTML += `
      <div class="branch-header">${s.branch.condition}</div>
      <div class="branch-grid">${opts}</div>`;
  }

  // Q&A
  if (s.qa && s.qa.length) {
    const qaItems = s.qa.map((item, i) => `
      <div class="qa-item" id="qa-${step}-${i}">
        <div class="qa-question" onclick="toggleQA('qa-${step}-${i}')">
          <div class="qa-question-left">
            <span class="qa-q-badge">Q</span>
            <span>${item.q}</span>
          </div>
          <span class="qa-chevron">▼</span>
        </div>
        <div class="qa-answer">
          <span class="qa-a-badge">A</span>${item.a}
        </div>
      </div>`).join('');
    bodyHTML += `
      <div class="qa-section">
        <div class="qa-section-label">🙅 よくある断り文句への切り返し</div>
        ${qaItems}
      </div>`;
  }

  const isLast = step === steps.length - 1;

  document.getElementById('mainCard').innerHTML = `
    <div class="card-header">
      <div>
        <span class="step-badge" style="${badgeStyle}">STEP ${s.id}</span>
      </div>
      <div>
        <div class="card-title">${s.title}</div>
        <div class="card-subtitle">${s.subtitle}</div>
      </div>
    </div>
    <div class="card-body">${bodyHTML}</div>
    <div class="card-footer">
      <button class="btn btn-prev" onclick="prev()" ${step === 0 ? 'disabled' : ''}>
        ← 前のステップ
      </button>
      <span class="step-counter">${step + 1} / ${steps.length}</span>
      <button class="btn ${isLast ? 'btn-finish' : 'btn-next'}" onclick="next()">
        ${isLast ? '✅ 完了！' : '次のステップ →'}
      </button>
    </div>
  `;
}

function renderComplete() {
  document.getElementById('mainCard').innerHTML = `
    <div class="complete-screen">
      <div class="complete-icon">🎉</div>
      <div class="complete-title">スクリプト完了！</div>
      <div class="complete-body">
        全7ステップのトークスクリプトをひととおり確認しました。<br>
        実際の電話前に何度か声に出して練習してみましょう。<br><br>
        <strong>ポイントのおさらい</strong><br>
        明るく名乗る → メリットを2点だけ伝える → 情報共有スタンスでアポを取る<br>
        → 改定月を確認 → ヒアリング → 興味を引き出す → URLと前日確認
      </div>
      <button class="btn-restart" onclick="restart()">🔄 最初から見る</button>
    </div>
  `;
  buildNav();
  buildProgress();
}

function goTo(i) {
  currentStep = i;
  renderAll();
}

function next() {
  currentStep++;
  renderAll();
}

function prev() {
  if (currentStep > 0) currentStep--;
  renderAll();
}

function restart() {
  currentStep = 0;
  renderAll();
}

function toggleQA(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function renderAll() {
  buildNav();
  buildProgress();
  renderStep(currentStep);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderAll();
</script>
